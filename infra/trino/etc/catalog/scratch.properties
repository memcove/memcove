# Trino DuckDB connector → the Memcove scratchpad plane (fast, small, ephemeral).
# A single shared DuckDB file; tenants are isolated by schema + the SQL guard
# (MEMCOVE_SCRATCH_CATALOG_MODE=shared). The file lives under /tmp so it's writable
# by the Trino user and resets with the container — appropriate for scratch data.
connector.name=duckdb
connection-url=jdbc:duckdb:/tmp/memcove-scratch.duckdb
