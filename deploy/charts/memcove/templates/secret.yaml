{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "memcove.secretName" . }}
  labels:
    {{- include "memcove.labels" . | nindent 4 }}
type: Opaque
stringData:
  # S3 keys are left empty for IRSA / the default credential chain.
  MEMCOVE_S3_ACCESS_KEY: {{ .Values.secrets.values.s3AccessKey | quote }}
  MEMCOVE_S3_SECRET_KEY: {{ .Values.secrets.values.s3SecretKey | quote }}
  MEMCOVE_PG_DSN: {{ .Values.secrets.values.pgDsn | quote }}
  MEMCOVE_FLIGHT_TICKET_SECRET: {{ .Values.secrets.values.flightTicketSecret | quote }}
{{- end }}
